<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>VoxRead</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        width: 320px;
        padding: 12px;
        background: #f9fafb;
      }

      h3 {
        margin-bottom: 10px;
      }

      button {
        padding: 6px 10px;
        margin: 3px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #2563eb;
        color: white;
        font-size: 12px;
      }

      button:hover {
        background: #1e40af;
      }

      select {
        width: 100%;
        padding: 5px;
        margin-top: 5px;
        border-radius: 5px;
      }

      #controls {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 10px;
      }

      #content {
        margin-top: 10px;
        max-height: 150px;
        overflow-y: auto;
        font-size: 12px;
        border: 1px solid #ddd;
        padding: 6px;
        border-radius: 6px;
        background: white;
      }

      #status {
        margin-top: 8px;
        font-size: 11px;
        color: #555;
      }

      .section {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h3>🎧 VoxRead</h3>
    <p style="font-size: 12px; color: gray">Listen instead of reading</p>

    <button id="extract">Extract Article</button>

    <div class="section">
      <label>Voice:</label>
      <select id="voice">
        <option value="en-IN-PrabhatNeural">🇮🇳 Male (Prabhat)</option>
        <option value="en-IN-NeerjaNeural">🇮🇳 Female (Neerja)</option>
        <option value="en-US-GuyNeural">🇺🇸 Male (Guy)</option>
        <option value="en-GB-SoniaNeural">🇬🇧 Female (Sonia)</option>
      </select>
    </div>

    <div class="section">
      <label>Speed:</label>
      <select id="speed">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>

    <div id="controls">
      <button id="play">▶ Play</button>
      <button id="pause">⏸</button>
      <button id="resume">▶</button>
      <button id="stop">⏹</button>
      <button id="download">⬇</button>
    </div>

    <div id="content">No content yet...</div>

    <div id="status">Idle</div>

    <script src="popup.js"></script>
  </body>
</html>
